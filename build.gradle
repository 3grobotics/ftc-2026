/**
 * Top-level build file for ftc_app project.
 *
 * It is extraordinarily rare that you will ever need to edit this file.
 */

buildscript {
    ext.kotlinVersion = '2.3.0' // <-- ADD THIS LINE

    repositories {
        mavenCentral()
        google()
    }
    dependencies {
        // Note for FTC Teams: Do not modify this yourself.
        classpath 'com.android.tools.build:gradle:8.7.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion" // <-- ADD THIS LINE
    }
}

// This is now required because aapt2 has to be downloaded from the
// google() repository beginning with version 3.2 of the Android Gradle Plugin
allprojects {
    repositories {
        mavenCentral()
        google()
    }
}

repositories {
    mavenCentral()
}
// Disables Android Lint to prevent AGP metadata crashes with newer libraries
allprojects {
    tasks.configureEach { task ->
        if (task.name.toLowerCase().contains("lint")) {
            task.enabled = false
        }
    }
}